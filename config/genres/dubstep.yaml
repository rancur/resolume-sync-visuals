# Dubstep visual vocabulary
# Heavy wobble bass, mechanical, glitch aesthetics

motion:
  pattern: wobble_sync
  intensity: 0.85
  camera: shake_on_drop
  rhythm: half_time_heavy
  transition: glitch_cut

palette:
  - "#7B1FA2"   # Deep purple
  - "#000000"   # Pure black
  - "#00E676"   # Toxic green
  - "#F44336"   # Red alert
  - "#1A1A2E"   # Dark blue-black
  - "#FF6F00"   # Dark amber

textures:
  - mechanical
  - glitch_artifact
  - data_corruption
  - heavy_metal
  - smoke

composition: centered_heavy
depth: massive_scale
contrast: extreme

reference_styles:
  - "massive mechanical structures in dark void"
  - "bass-reactive geometry with glitch distortion"
  - "heavy industrial with smoke and sparks"
  - "digital corruption spreading through landscape"
