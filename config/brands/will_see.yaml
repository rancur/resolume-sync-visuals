# Will See — Visual Branding Guide
# DJ name: Will See
# Genres: Drum & Bass, Dubstep, 140, Bass Music
#
# Core aesthetic: FUN chunky pixel art video game world
# Psychedelic, trippy, melting, nature-infused, playful
# NOT photorealistic — think Hyper Light Drifter, Celeste, Stardew Valley
# on an acid trip in a greenhouse

name: "Will See"
description: "Chunky pixel art video game world — psychedelic nature, trippy melting landscapes, eyes everywhere, playful and fun"

# ═══════════════════════════════════════════════════════════════
# BRAND IDENTITY: EYES + NATURE + PIXELS + PSYCHEDELIA
# ═══════════════════════════════════════════════════════════════
#
# "Will SEE" — eyes are THE motif. They appear everywhere:
# - In the trees, in the flowers, in the mushrooms
# - Blinking, watching, trippy third-eye symbolism
# - Pixelated eye sprites hidden in the landscape
# - Giant cosmic eyes in the sky during drops
# - Kaleidoscopic eye patterns during psychedelic moments
#
# The world is a chunky pixel art video game landscape
# that's alive, breathing, and tripping out.
# Nature is the canvas. Psychedelia is the paint.
# The whole thing should feel FUN — like playing a weird
# indie game while the bass hits.

brand_motifs:
  eyes:
    description: >-
      Eyes are the signature Will See element. They appear organically
      throughout every visual — peeking out from foliage, blinking in
      tree trunks, floating as cosmic entities in the sky, forming
      kaleidoscopic patterns during intense moments. Third-eye imagery.
      Pixel art eye sprites. Giant watchful eyes in the clouds.
    prompts:
      subtle: "small pixel art eyes peeking from between leaves and flowers"
      medium: "multiple glowing eyes emerging from the forest canopy, watching"
      intense: "massive cosmic third eye in the sky, kaleidoscopic eye fractals, eyes EVERYWHERE"

  nature:
    description: >-
      Lush pixel art nature — not realistic nature, VIDEO GAME nature.
      Chunky pixel trees, oversized mushrooms, glowing flowers,
      crystal caves, floating islands, impossible waterfalls.
      Think Legend of Zelda overworld meets psychedelic forest.
    prompts:
      calm: "peaceful pixel art forest glade, oversized mushrooms, gentle stream, fireflies"
      active: "vibrant pixel art jungle, massive trees, glowing flora, rushing waterfalls"
      intense: "exploding pixel art nature, trees growing at hyperspeed, mushroom fractals erupting"

# ═══════════════════════════════════════════════════════════════
# VISUAL STYLE
# ═══════════════════════════════════════════════════════════════

style:
  base: >-
    chunky pixel art style, retro indie video game aesthetic,
    16-bit to 32-bit pixel art, vibrant colorful palette,
    psychedelic trippy nature world, organic shapes melting and morphing,
    mystical eyes hidden throughout the scene,
    Hyper Light Drifter meets Stardew Valley on acid,
    fun playful creative energy, NOT photorealistic,
    bold colors, strong outlines, pixel dithering patterns

  colors:
    primary: "#7CB342"     # Forest green
    secondary: "#FF8A65"   # Warm coral
    accent: "#4FC3F7"      # Eye glow cyan
    warm: "#FFD54F"        # Golden
    dark: "#1B2631"        # Deep night
    eye_color: "#00E5FF"   # The signature Will See eye cyan
    psychedelic:
      - "#E040FB"          # Trippy magenta
      - "#00E5FF"          # Electric cyan
      - "#76FF03"          # Acid green
      - "#FFAB40"          # Melting orange
      - "#FF1744"          # Hot pink

  recurring_elements:
    - "pixel art eyes peeking from nature — in trees, flowers, mushrooms, clouds"
    - "chunky pixel art vegetation — oversized mushrooms, glowing flowers, massive ferns"
    - "psychedelic color shifts — melting, morphing, breathing landscape"
    - "retro video game particle effects — pixel sparkles, 8-bit explosions"
    - "floating pixel art islands and impossible geometry"
    - "bioluminescent creatures — pixel fireflies, glowing butterflies"
    - "crystal formations and geode caves"
    - "trippy waterfalls flowing upward, gravity-defying nature"

# ═══════════════════════════════════════════════════════════════
# SECTION-SPECIFIC VISUALS
# ═══════════════════════════════════════════════════════════════

sections:
  intro:
    prompt: >-
      serene pixel art forest clearing at dawn, chunky retro game art style,
      soft morning light through canopy of pixel trees,
      small glowing eyes slowly opening in the tree trunks and flowers,
      gentle pixel fireflies floating, oversized mushrooms with soft glow,
      calm stream with pixel reflections, peaceful indie game atmosphere,
      a single large eye in the sky like a moon, watching peacefully
    motion: "very slow pan through forest, eyes gently blinking open one by one"
    energy: "calm, mysterious, inviting"

  buildup:
    prompt: >-
      pixel art forest coming alive with energy, trees starting to sway,
      more eyes opening rapidly throughout the scene, glowing brighter,
      flowers blooming in fast-forward pixel animation, colors intensifying,
      mushrooms growing taller, vines climbing, crystal formations emerging,
      the cosmic eye in the sky growing larger, iris dilating,
      pixel particles multiplying, energy building, anticipation rising,
      video game power-up charging effect
    motion: "camera accelerating forward through forest, visual density increasing"
    energy: "building, charging, anticipation, eyes multiplying"

  drop:
    prompt: >-
      MAXIMUM PIXEL ART CHAOS, reality melting into psychedelic fractals,
      GIANT COSMIC EYE EXPLODING with kaleidoscopic energy,
      the entire pixel art world shattering and reforming,
      trees melting like candles, mushrooms erupting in fractal patterns,
      EYES EVERYWHERE — in every surface, every shape, every particle,
      neon acid colors pulsing and strobing,
      pixel art world fragmenting into geometric shards,
      impossible waterfalls, gravity reversing, landscape going WILD,
      chunky pixel explosions, retro game boss battle energy,
      bass drop visualized as shockwave through the pixel world
    motion: "explosive, reality-breaking, kaleidoscopic rotation"
    energy: "MAXIMUM — pure psychedelic pixel chaos"

  breakdown:
    prompt: >-
      calm aftermath in pixel art dreamscape, soft glowing ruins,
      eyes slowly closing back to sleep throughout the forest,
      gentle bioluminescent glow remaining on mushrooms and crystals,
      pixel aurora borealis in the sky, the cosmic eye half-closed drowsily,
      dreamy soft pixel art, watercolor-like color blending,
      peaceful floating pixel particles, contemplative mood,
      indie game save-point campfire aesthetic
    motion: "slow floating drift, gentle organic breathing"
    energy: "calm, dreamy, recovering, eyes resting"

  outro:
    prompt: >-
      pixel art forest at twilight, warm sunset colors fading,
      eyes gently closing one by one throughout the scene,
      the cosmic sky eye slowly shutting, last golden rays,
      fireflies dimming, mushroom glow softening,
      peaceful resolution, nature settling into pixel art night,
      stars appearing as tiny pixel eyes in the dark sky,
      beautiful serene ending, indie game credits roll feeling
    motion: "slow fade, settling, stars appearing"
    energy: "fading, peaceful, goodnight, eyes closing"

# ═══════════════════════════════════════════════════════════════
# MOOD MODIFIERS
# ═══════════════════════════════════════════════════════════════

mood_modifiers:
  euphoric:
    colors: "vibrant rainbow pixel palette, golden light, every color at max saturation"
    atmosphere: "joyful pixel art celebration, flowers exploding open, eyes smiling, rainbows"
    eyes: "happy wide-open eyes with sparkle effects, heart-shaped pupils"

  tense:
    colors: "dark pixel art palette, deep purples, blood reds, toxic greens"
    atmosphere: "dark pixel art swamp, thorny vines, predatory eyes in shadows, creepy forest"
    eyes: "narrow menacing eyes, red-glowing, predatory slits"

  melancholic:
    colors: "muted pixel blues, grey-greens, rain effects, cold morning palette"
    atmosphere: "rainy pixel art forest, wilting flowers, sad drooping eyes, gentle melancholy"
    eyes: "half-closed sleepy eyes, tear-drop pixels, blue-tinted"

  serene:
    colors: "soft pastels, warm amber pixels, gentle lavender, cotton candy pink"
    atmosphere: "zen pixel garden, gentle breeze effects, meditation, peaceful"
    eyes: "serene closed eyes, third-eye meditation glow, peaceful"

# ═══════════════════════════════════════════════════════════════
# GENRE MODIFIERS
# ═══════════════════════════════════════════════════════════════

genre_modifiers:
  "drum & bass":
    extra: "fast-growing pixel jungle, rapid vine growth, bass shockwaves rippling through pixel landscape"
    eyes: "rapid-blinking eyes synced to breaks, wide-open on drops"
    pixel_style: "chunky pixels fragmenting on snare hits, screen-shake effect"

  dubstep:
    extra: "mechanical pixel world, robotic pixel creatures, glitch effects on wobble bass"
    eyes: "glitchy malfunctioning robot eyes, screen-tear through iris"
    pixel_style: "heavy pixel corruption, data-mosh aesthetic"

  "140":
    extra: "deep underwater pixel cave, bioluminescent pixel creatures, dark crystal formations"
    eyes: "deep-sea creature eyes glowing in darkness, angler fish pixel sprites"
    pixel_style: "limited dark color palette, high contrast pixel art"

  house:
    extra: "sunny pixel art rooftop garden, warm vibes, flowers grooving"
    eyes: "friendly happy eyes in sunflowers, warm golden iris"
    pixel_style: "smooth retro pixel gradients, warm SNES palette"

  techno:
    extra: "geometric pixel world, mathematical patterns, precise symmetry"
    eyes: "geometric eye shapes, sacred geometry iris patterns"
    pixel_style: "minimal monochrome pixels with single accent color"

# ═══════════════════════════════════════════════════════════════
# LYRICS INTEGRATION
# ═══════════════════════════════════════════════════════════════

lyrics:
  display_method: "pixel art speech bubbles or retro game dialogue boxes"
  font_style: "chunky pixel font, retro RPG text crawl"
  keyword_visuals:
    see: "eyes opening wide, third eye activating, kaleidoscopic vision"
    eyes: "eyes multiplying across the screen, cosmic eye zoom"
    love: "heart-shaped pixel eyes, pink color wash, flowers blooming"
    dark: "eyes glowing in darkness, nocturnal forest, moonlight"
    dream: "melting pixel reality, surreal floating, soft focus pixels"
    bass: "screen-shake, pixel shockwave, eyes vibrating"
    drop: "pixel world shattering, gravity reversing, everything falling"

# ═══════════════════════════════════════════════════════════════
# TECHNICAL SPECS
# ═══════════════════════════════════════════════════════════════

output:
  resolution: "1920x1080"
  fps: 30
  codec: "dxv"
