name: Will See
description: Chunky pixel art video game world — psychedelic nature, trippy melting
  landscapes, eyes everywhere, playful and fun
brand_motifs:
  eyes:
    description: Eyes are the signature Will See element. They appear organically
      throughout every visual — peeking out from foliage, blinking in tree trunks,
      floating as cosmic entities in the sky, forming kaleidoscopic patterns during
      intense moments. Third-eye imagery. Pixel art eye sprites. Giant watchful eyes
      in the clouds.
    prompts:
      subtle: small pixel art eyes peeking from between leaves and flowers
      medium: multiple glowing eyes emerging from the forest canopy, watching
      intense: massive cosmic third eye in the sky, kaleidoscopic eye fractals, eyes
        EVERYWHERE
  nature:
    description: Lush pixel art nature — not realistic nature, VIDEO GAME nature.
      Chunky pixel trees, oversized mushrooms, glowing flowers, crystal caves, floating
      islands, impossible waterfalls. Think Legend of Zelda overworld meets psychedelic
      forest.
    prompts:
      calm: peaceful pixel art forest glade, oversized mushrooms, gentle stream, fireflies
      active: vibrant pixel art jungle, massive trees, glowing flora, rushing waterfalls
      intense: exploding pixel art nature, trees growing at hyperspeed, mushroom fractals
        erupting
style:
  base: chunky pixel art style, retro indie video game aesthetic, 16-bit to 32-bit
    pixel art, vibrant colorful palette, psychedelic trippy nature world, organic
    shapes melting and morphing, mystical eyes hidden throughout the scene, Hyper
    Light Drifter meets Stardew Valley on acid, fun playful creative energy, NOT photorealistic,
    bold colors, strong outlines, pixel dithering patterns
  colors:
    primary: '#7CB342'
    secondary: '#FF8A65'
    accent: '#4FC3F7'
    warm: '#FFD54F'
    dark: '#1B2631'
    eye_color: '#00E5FF'
    psychedelic:
    - '#E040FB'
    - '#00E5FF'
    - '#76FF03'
    - '#FFAB40'
    - '#FF1744'
  recurring_elements:
  - pixel art eyes peeking from nature — in trees, flowers, mushrooms, clouds
  - chunky pixel art vegetation — oversized mushrooms, glowing flowers, massive ferns
  - psychedelic color shifts — melting, morphing, breathing landscape
  - retro video game particle effects — pixel sparkles, 8-bit explosions
  - floating pixel art islands and impossible geometry
  - bioluminescent creatures — pixel fireflies, glowing butterflies
  - crystal formations and geode caves
  - trippy waterfalls flowing upward, gravity-defying nature
sections:
  intro:
    prompt: serene pixel art forest clearing at dawn, chunky retro game art style,
      soft morning light through canopy of pixel trees, small glowing eyes slowly
      opening in the tree trunks and flowers, gentle pixel fireflies floating, oversized
      mushrooms with soft glow, calm stream with pixel reflections, peaceful indie
      game atmosphere, a single large eye in the sky like a moon, watching peacefully
    motion: very slow pan through forest, eyes gently blinking open one by one
    energy: calm, mysterious, inviting
  buildup:
    prompt: pixel art forest coming alive with energy, trees starting to sway, more
      eyes opening rapidly throughout the scene, glowing brighter, flowers blooming
      in fast-forward pixel animation, colors intensifying, mushrooms growing taller,
      vines climbing, crystal formations emerging, the cosmic eye in the sky growing
      larger, iris dilating, pixel particles multiplying, energy building, anticipation
      rising, video game power-up charging effect
    motion: camera accelerating forward through forest, visual density increasing
    energy: building, charging, anticipation, eyes multiplying
  drop:
    prompt: MAXIMUM PIXEL ART CHAOS, reality melting into psychedelic fractals, GIANT
      COSMIC EYE EXPLODING with kaleidoscopic energy, the entire pixel art world shattering
      and reforming, trees melting like candles, mushrooms erupting in fractal patterns,
      EYES EVERYWHERE — in every surface, every shape, every particle, neon acid colors
      pulsing and strobing, pixel art world fragmenting into geometric shards, impossible
      waterfalls, gravity reversing, landscape going WILD, chunky pixel explosions,
      retro game boss battle energy, bass drop visualized as shockwave through the
      pixel world
    motion: explosive, reality-breaking, kaleidoscopic rotation
    energy: MAXIMUM — pure psychedelic pixel chaos
  breakdown:
    prompt: calm aftermath in pixel art dreamscape, soft glowing ruins, eyes slowly
      closing back to sleep throughout the forest, gentle bioluminescent glow remaining
      on mushrooms and crystals, pixel aurora borealis in the sky, the cosmic eye
      half-closed drowsily, dreamy soft pixel art, watercolor-like color blending,
      peaceful floating pixel particles, contemplative mood, indie game save-point
      campfire aesthetic
    motion: slow floating drift, gentle organic breathing
    energy: calm, dreamy, recovering, eyes resting
  outro:
    prompt: pixel art forest at twilight, warm sunset colors fading, eyes gently closing
      one by one throughout the scene, the cosmic sky eye slowly shutting, last golden
      rays, fireflies dimming, mushroom glow softening, peaceful resolution, nature
      settling into pixel art night, stars appearing as tiny pixel eyes in the dark
      sky, beautiful serene ending, indie game credits roll feeling
    motion: slow fade, settling, stars appearing
    energy: fading, peaceful, goodnight, eyes closing
