# Halloween theme overlay
name: halloween
description: Dark gothic halloween atmosphere with fog and eerie lighting

color_shift:
  hue_rotate: 30
  saturation: 0.7
  brightness: 0.8

prompt_prefix: "dark gothic halloween atmosphere, eerie fog, orange and purple lighting"
prompt_suffix: "spooky, mysterious, jack-o-lantern glow"

overlay_elements:
  - fog
  - bats
  - jack_o_lantern
  - cobwebs
  - moonlight

venue_adjustments:
  contrast: 1.2
  gamma: 0.9

schedule:
  start_month: 10
  start_day: 1
  end_month: 11
  end_day: 1
