# Dark club venue preset
name: dark_club
description: Optimized for dark indoor clubs with LED walls — high contrast, deep blacks

color_shift:
  hue_rotate: 0
  saturation: 1.1
  brightness: 0.85

prompt_prefix: "dark underground club atmosphere, neon accents on black"
prompt_suffix: "high contrast, deep shadows, LED-optimized, strobing highlights"

overlay_elements:
  - smoke_machine
  - laser_beams
  - strobe_flash

venue_adjustments:
  contrast: 1.3
  gamma: 0.85
  black_level: 0.05
