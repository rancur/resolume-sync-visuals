services:
  app:
    build:
      dockerfile: Dockerfile.dev
    volumes:
      - .:/app
      - rsv-data:/data
    ports:
      - "8000:8000"
    command: uvicorn server.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    image: node:20-alpine
    working_dir: /app/web
    volumes:
      - ./web:/app/web
    ports:
      - "5173:5173"
    command: npm run dev -- --host 0.0.0.0
